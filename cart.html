<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | CM Strength</title>
<meta name="description" content="Review selected CM Strength coaching packages and PDF programs before checkout.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/main.js" defer></script>
</head>
<body data-page="cart">
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div id="site-header"></div>
<div id="page-cart" class="page active">
  <section class="hero hero-compact">
    <div class="hero-bg"></div>
    <div class="hero-content hero-content-narrow">
      <div class="hero-eyebrow"><span data-en="Your selections" data-ko="선택한 항목">Your selections</span></div>
      <h1 class="display-xl hero-title hero-title-compact"><span data-en="CART" data-ko="장바구니">CART</span></h1>
      <div class="cart-page-card">
        <ul class="cart-items"></ul>
        <div class="cart-summary"><span data-en="Total" data-ko="합계">Total</span><strong class="cart-total">KRW 0</strong></div>
        <div class="cart-actions">
          <button class="btn btn-ghost clear-cart" type="button" data-en="Clear Cart" data-ko="장바구니 비우기">Clear Cart</button>
          <button class="btn btn-gold" type="button" data-cart-checkout data-en="Proceed to Checkout" data-ko="결제 진행">Proceed to Checkout</button>
        </div>
      </div>
    </div>
  </section>
  
</div>
<div id="site-footer"></div>
</body>
</html>
